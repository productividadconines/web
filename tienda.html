<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Tienda</title>

 <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #eef1ff;
    }

    /* NAVBAR */

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: #fff5cf;
      border-radius: 40px;
      margin: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      font-weight: 700;
    }
.logo {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: #013f62;
      font-size: 22px;
    }

    .menu {
      display: flex;
      gap: 30px;
    }

   /* LINKS SIEMPRE IGUAL */
    .menu a,
    .menu a:visited,
    .menu a:active,
    .menu a:hover {
      text-decoration: none;
      color: #013f62;
      font-size: 16px;
      transition: 0.3s;
    }

    /* pequeño efecto elegante */
    .menu a:hover {
      opacity: 0.7;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search {
      border: none;
      background: #013f62; /* fondo oscuro */
      color: #fff5cf; /* texto Search */
      padding: 8px 15px;
      border-radius: 20px;
      outline: none;
    }

    .search::placeholder {
      color: #fff5cf; /* placeholder */
    }

    .icon {
      font-size: 18px;
      color: #013f62;
    }

    /* ⭐ ESTRELLA NO CLICABLE */
    .estrella {
      cursor: default;
      user-select: none;
      pointer-events: none;
    }
  

    /* PRODUCTO */

    .tienda {
  padding: 60px;
  display: flex;
  justify-content: flex-start; /* 👈 lo manda a la izquierda */
}

    .producto {
      width: 400px;
      text-align: center;
    }

    .producto img {
  width: 400px;
  height: 400px;
  object-fit: cover;
  border-radius: 30px;
  display: block;
}
    /* LINK IMAGEN */

.producto-link {
  display: block;
}

    .producto h2 {
      font-size: 32px;
      color: #a5b4ff;
      margin-top: 25px;
      margin-bottom: 10px;
      white-space: nowrap;
    }

    /* LINK TITULO */

  .titulo-link {
    text-decoration: none;
    color: #a5b4ff;
  }

    .linea {
      width: 40px;
    height: 2px;
    background: #013f62;
    margin: 0 auto 20px auto;
    }

    .precio {
      font-size: 40px;
      color: #013f62;
      font-weight: 700;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      PRODUCTIVIDAD CON INES
    </div>

    <div class="menu">
      <a href="ines.html">Inés</a>
      <a href="#">Cursos</a>
      <a href="tienda.html">Tienda</a>
    </div>

  <div class="right">
    <i class="fas fa-user icon"></i>
    <span class="icon estrella">✷</span>
    <input class="search" type="text" placeholder="Search">
    <i class="fas fa-search icon"></i>
  </div>
</div>

  <!-- PRODUCTO -->

  <section class="tienda">
   <div class="producto">

  <a href="https://inesvidal-ugc.systeme.io/webplannersemanalnotion" target="_blank" class="producto-link">
    <img src="planner.png" alt="Planner Notion">
  </a>

  <h2>
    <a href="https://inesvidal-ugc.systeme.io/webplannersemanalnotion" target="_blank" class="titulo-link">
      Planner Semanal Notion
    </a>
  </h2>

  <div class="linea"></div>

  <div class="precio">0,00€</div>

</div>

  </section>

</body>
</html>
