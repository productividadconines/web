<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>inesvidal.es</title>

<!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #fff8de;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: #fff5cf; /* fondo */
      border-radius: 40px;
      margin: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: #013f62; /* amarillo */
      font-size: 22px;
    }

    .menu {
      display: flex;
      gap: 30px;
    }

   /* LINKS SIEMPRE IGUAL */
    .menu a,
    .menu a:visited,
    .menu a:active,
    .menu a:hover {
      text-decoration: none;
      color: #013f62;
      font-size: 16px;
      transition: 0.3s;
    }

    /* pequeño efecto elegante */
    .menu a:hover {
      opacity: 0.7;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search {
      border: none;
      background: #013f62; /* fondo oscuro */
      color: #fff5cf; /* texto Search */
      padding: 8px 15px;
      border-radius: 20px;
      outline: none;
    }

    .search::placeholder {
      color: #fff5cf; /* placeholder */
    }

    .icon {
      font-size: 18px;
      color: #013f62;
    }

    /* ⭐ ESTRELLA NO CLICABLE */
    .estrella {
      cursor: default;
      user-select: none;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo"> PRODUCTIVIDAD CON INES </div>

    <div class="menu">
      <a href="#">Home</a>
      <a href="ines.html">Inés</a> <!-- 👈 AHORA VA A OTRA PÁGINA -->
      <a href="#">Cursos</a>
      <a href="#">Tienda</a>
    </div>

    <div class="right">
      <i class="fas fa-user icon"></i>
      <span class="icon estrella">✷</span>
      <input class="search" type="text" placeholder="Search">
      <i class="fas fa-search icon"></i>
    </div>
  </div>

</body>
</html>
