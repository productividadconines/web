<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Web</title>

<!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8f8f8;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: #ffeda8;
      border-radius: 40px;
      margin: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .logo {
      font-weight: 600;
      color: #013f62;
      font-size: 20px;
    }

    .menu {
      display: flex;
      gap: 30px;
    }

    .menu a {
      text-decoration: none;
      color: #013f62;
      font-size: 16px;
    }

    .menu a:hover {
      color: #ffeda8;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search {
      border: none;
      background: #013f62;
      padding: 8px 15px;
      border-radius: 20px;
      outline: none;
    }

    .icon {
      font-size: 18px;
      cursor: pointer;
      color: #013f62;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo"> 🌟PRODUCTIVIDAD CON INES🌟 </div>

    <div class="menu">
      <a href="#">Home</a>
      <a href="#">Inés</a>
      <a href="#">Cursos</a>
      <a href="#">Tienda</a>
    </div>

    <div class="right">
      <i class="fas fa-user icon"></i>
      <i class="far fa-heart icon"></i>
      <input class="search" type="text" placeholder="Search">
      <i class="fas fa-search icon"></i>
    </div>
  </div>

</body>
</html>
