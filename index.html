<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>inesvidal.es</title>

<!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <!-- Iconos -->
  <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #f8f8f8;
    }

    .hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 80px 60px;
  background: #cad3ff;
  border-radius: 40px;
  margin: 20px;
}

.hero-text {
  max-width: 50%;
}

.hero-text h1 {
  font-size: 48px;
  color: #013f62;
  font-weight: 700;
  line-height: 1.2;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  background: transparent;
  border: 2px solid #013f62;
  color: #013f62;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #013f62;
  color: #fff5cf;
}

.hero-img img {
  width: 400px;
  border-radius: 20px;
}

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: #fff5cf; /* fondo */
      border-radius: 40px;
      margin: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    <section id="ines" class="hero">
  <div class="hero-text">
    <h1>Tu aliada en productividad<br>con café ☕</h1>
    <a href="mailto:info@inesvidal.es" class="btn">¡Colaboremos!</a>
  </div>

  <div class="hero-img">
    <img src="https://via.placeholder.com/400x500" alt="Tu imagen">
  </div>
</section>

    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: #013f62; /* amarillo */
      font-size: 22px;
    }

    .menu {
      display: flex;
      gap: 30px;
    }

   /* LINKS SIEMPRE IGUAL */
    .menu a,
    .menu a:visited,
    .menu a:active,
    .menu a:hover {
      text-decoration: none;
      color: #013f62;
      font-size: 16px;
      transition: 0.3s;
    }

    /* pequeño efecto elegante */
    .menu a:hover {
      opacity: 0.7;
    }

    .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search {
      border: none;
      background: #013f62; /* fondo oscuro */
      color: #fff5cf; /* texto Search */
      padding: 8px 15px;
      border-radius: 20px;
      outline: none;
    }

    .search::placeholder {
      color: #fff5cf; /* placeholder */
    }

    .icon {
      font-size: 18px;
      color: #013f62;
    }

    /* ⭐ ESTRELLA NO CLICABLE */
    .estrella {
      cursor: default;
      user-select: none;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo"> PRODUCTIVIDAD CON INES </div>

    <div class="menu">
      <a href="#">Home</a>
      <a href="#ines">Inés</a>
      <a href="#">Cursos</a>
      <a href="#">Tienda</a>
    </div>

    <div class="right">
      <i class="fas fa-user icon"></i>
      <span class="icon estrella">✷</span>
      <input class="search" type="text" placeholder="Search">
      <i class="fas fa-search icon"></i>
    </div>
  </div>

</body>
</html>
