<!DOCTYPE html>
<html lang="es">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #cad3ff;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px;
    }

    h1 {
      font-size: 50px;
      color: #013f62;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 25px;
      border-radius: 25px;
      border: 2px solid #013f62;
      color: #013f62;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #013f62;
      color: #fff5cf;
    }

    img {
      width: 400px;
      border-radius: 20px;
    }
  </style>

<body>

  <section class="hero">
    <div>
      <h1>Tu aliada en productividad con café ☕</h1>
      <a href="mailto:info@inesvidal.es" class="btn">¡Colaboremos!</a>

</html>
